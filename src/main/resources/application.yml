server:
  port: ${PORT:8080}

spring:
  application:
    name: vertx-crm
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  security:
    require-auth: ${APP_REQUIRE_AUTH:false}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173}
